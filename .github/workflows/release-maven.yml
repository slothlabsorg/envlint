name: release-maven

# Publishes the Kotlin/JVM artifact to GitHub Packages when a tag like
# `jvm-v0.1.0` is pushed. Uses the built-in GITHUB_TOKEN, so no extra secrets
# are required. The version is derived from the tag (jvm-v0.1.0 -> 0.1.0).
on:
  push:
    tags:
      - "jvm-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: maven publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Derive version from tag
        run: echo "ENVLINT_VERSION=${GITHUB_REF_NAME#jvm-v}" >> "$GITHUB_ENV"
      - run: ./gradlew publishMavenPublicationToGprRepository -Pversion=${ENVLINT_VERSION} --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
