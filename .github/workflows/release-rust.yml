name: release-rust

# Publishes the Rust crate to crates.io when a tag like `rust-v0.1.0` is pushed.
# One-time setup: add a CARGO_REGISTRY_TOKEN repository secret (crates.io API token).
on:
  push:
    tags:
      - "rust-v*"

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
